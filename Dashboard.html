<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão à Vista - Linha CT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .live-indicator { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col p-4 md:p-8">

    <header class="flex justify-between items-center mb-8 bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
        <div class="flex items-center gap-6">
            <svg viewBox="0 0 350 100" class="h-12 object-contain" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="346" height="56" fill="none" stroke="#ffffff" stroke-width="3"/>
                <rect x="8" y="8" width="334" height="44" fill="#ffffff"/>
                <text x="175" y="41" fill="#231f20" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" text-anchor="middle" letter-spacing="3">RANDON</text>
                <text x="5" y="94" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900" letter-spacing="1">TRIEL-HT</text>
                <polygon points="195,94 240,94 270,64 195,64" fill="#e30613"/>
                <polygon points="250,94 270,94 300,64 280,64" fill="#ffffff"/>
                <polygon points="280,94 345,94 345,64 310,64" fill="#a7a9ac"/>
            </svg>
            <div class="border-l border-slate-600 pl-6">
                <h1 class="text-3xl font-black tracking-wide text-white">GESTÃO À VISTA</h1>
                <p class="text-blue-400 font-bold uppercase tracking-widest text-sm">Linha Carrega Tudo (CT)</p>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p id="data-atual" class="text-2xl font-bold text-white"></p>
                <p id="hora-atual" class="text-lg text-slate-400 font-mono"></p>
            </div>
            <div class="flex items-center gap-2 bg-slate-950 px-4 py-2 rounded-full border border-slate-700">
                <div class="w-3 h-3 bg-red-500 rounded-full live-indicator"></div>
                <span class="text-red-500 font-bold tracking-widest text-sm">AO VIVO</span>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
            <p class="text-slate-400 font-semibold uppercase text-sm mb-1">Efetivo (Ponto Soft)</p>
            <div class="flex items-baseline gap-2">
                <span id="kpi-pontosoft" class="text-5xl font-black text-blue-400">0</span>
                <span id="kpi-necessario" class="text-xl text-slate-500 font-bold">/ 0</span>
            </div>
        </div>
        <div id="card-absenteismo" class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg transition-colors">
            <p class="text-slate-400 font-semibold uppercase text-sm mb-1 text-inherit">Absenteísmo</p>
            <span id="kpi-absenteismo" class="text-5xl font-black">0</span>
        </div>
        <div id="card-manha" class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg flex justify-between items-center transition-colors">
            <div>
                <p class="text-slate-400 font-semibold uppercase text-sm mb-1 text-inherit">Ronda Manhã (Desvios)</p>
                <span id="kpi-manha-diff" class="text-5xl font-black">0</span>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 uppercase font-bold">Na Linha</p>
                <p id="kpi-manha-total" class="text-2xl font-bold text-slate-300">0</p>
            </div>
        </div>
        <div id="card-tarde" class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg flex justify-between items-center transition-colors">
            <div>
                <p class="text-slate-400 font-semibold uppercase text-sm mb-1 text-inherit">Ronda Tarde (Desvios)</p>
                <span id="kpi-tarde-diff" class="text-5xl font-black">0</span>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 uppercase font-bold">Na Linha</p>
                <p id="kpi-tarde-total" class="text-2xl font-bold text-slate-300">0</p>
            </div>
        </div>
    </div>

    <div class="flex-grow bg-slate-800 rounded-xl border border-slate-700 shadow-lg p-6 flex flex-col">
        <h2 class="text-xl font-bold text-white mb-6 border-b border-slate-700 pb-3">STATUS POR POSTO DE TRABALHO</h2>
        <div id="grid-postos" class="grid grid-cols-2 md:grid-cols-4 gap-4 flex-grow"></div>
    </div>

    <footer class="mt-8 text-center pb-2">
        <p class="text-xs font-semibold text-slate-500 tracking-wide uppercase">
            Desenvolvido por Alexsandro B. Tozzo - Analista de Production
        </p>
    </footer>

    <script>
        setInterval(() => {
            const agora = new Date();
            document.getElementById('data-atual').innerText = agora.toLocaleDateString('pt-BR');
            document.getElementById('hora-atual').innerText = agora.toLocaleTimeString('pt-BR');
        }, 1000);

        // CONFIGURAÇÃO CORRIGIDA - URL DENTRO DO CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyADizntIBb7U7SRJbENZq6ybZ1NuS2ri8w",
            authDomain: "gestaoalocamentolinhact.firebaseapp.com",
            databaseURL: "https://gestaoalocamentolinhact-default-rtdb.firebaseio.com",
            projectId: "gestaoalocamentolinhact",
            storageBucket: "gestaoalocamentolinhact.firebasestorage.app",
            messagingSenderId: "72994788023",
            appId: "1:72994788023:web:954b5a023130b5f77ab332"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('linhaCT/dados').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const pts = parseInt(data.efetivo.pontoSoft) || 0;
            const nec = parseInt(data.efetivo.necessario) || 0;
            const abs = Math.max(0, nec - pts);

            document.getElementById('kpi-pontosoft').innerText = pts;
            document.getElementById('kpi-necessario').innerText = `/ ${nec}`;
            document.getElementById('kpi-absenteismo').innerText = abs;
            
            const cardAbs = document.getElementById('card-absenteismo');
            if(abs > 0) { cardAbs.className = "bg-red-950/40 p-6 rounded-xl border border-red-500/50 text-red-400"; }
            else { cardAbs.className = "bg-slate-800 p-6 rounded-xl border border-slate-700 text-green-400"; }

            let tm = 0, tt = 0;
            if (data.postos) {
                data.postos.forEach(p => { 
                    if (p && p.manha) tm += parseInt(p.manha.pessoas) || 0; 
                    if (p && p.tarde) tt += parseInt(p.tarde.pessoas) || 0; 
                });
            }

            const pintaCardRonda = (idTotal, idDiff, idCard, total) => {
                const diff = pts - total;
                document.getElementById(idTotal).innerText = total;
                const elDiff = document.getElementById(idDiff);
                const elCard = document.getElementById(idCard);
                
                if (total === 0) { elDiff.innerText = "-"; elDiff.className = "text-5xl font-black text-slate-600"; elCard.className = "bg-slate-800 p-6 rounded-xl border border-slate-700"; }
                else if (diff === 0) { elDiff.innerText = "OK"; elDiff.className = "text-5xl font-black text-green-400"; elCard.className = "bg-green-950/20 p-6 rounded-xl border border-green-500/30"; }
                else if (diff > 0) { elDiff.innerText = diff; elDiff.className = "text-5xl font-black text-red-500"; elCard.className = "bg-red-950/30 p-6 rounded-xl border border-red-500/50"; }
                else { elDiff.innerText = `+${Math.abs(diff)}`; elDiff.className = "text-5xl font-black text-yellow-500"; elCard.className = "bg-yellow-950/20 p-6 rounded-xl border border-yellow-500/30"; }
            };

            pintaCardRonda('kpi-manha-total', 'kpi-manha-diff', 'card-manha', tm);
            pintaCardRonda('kpi-tarde-total', 'kpi-tarde-diff', 'card-tarde', tt);

            if (data.postos) {
                document.getElementById('grid-postos').innerHTML = data.postos.map(p => {
                    if (!p) return '';
                    const pManha = (p.manha && p.manha.pessoas) ? p.manha.pessoas : '-';
                    const ovManha = (p.manha && p.manha.ov) ? p.manha.ov : '---';
                    const pTarde = (p.tarde && p.tarde.pessoas) ? p.tarde.pessoas : '-';
                    const ovTarde = (p.tarde && p.tarde.ov) ? p.tarde.ov : '---';

                    return `
                        <div class="bg-slate-900 rounded-lg border border-slate-700 p-4 flex flex-col justify-between shadow-inner">
                            <h3 class="text-center font-bold text-slate-300 border-b border-slate-700 pb-2 mb-3 truncate">${p.nome || 'Posto'}</h3>
                            <div class="space-y-3">
                                <div class="flex justify-between items-center bg-slate-800 p-2 rounded border border-slate-700/50">
                                    <div class="flex flex-col">
                                        <span class="text-[10px] text-slate-500 font-bold uppercase">Manhã</span>
                                        <span class="text-xl font-black ${pManha !== '-' ? 'text-blue-400' : 'text-slate-600'}">${pManha}</span>
                                    </div>
                                    <div class="flex flex-col text-right w-24">
                                        <span class="text-[10px] text-slate-500 font-bold uppercase">OV</span>
                                        <span class="text-xs font-mono font-bold truncate ${ovManha !== '---' ? 'text-slate-300' : 'text-slate-600'}">${ovManha}</span>
                                    </div>
                                </div>
                                <div class="flex justify-between items-center bg-slate-800 p-2 rounded border border-slate-700/50">
                                    <div class="flex flex-col">
                                        <span class="text-[10px] text-slate-500 font-bold uppercase">Tarde</span>
                                        <span class="text-xl font-black ${pTarde !== '-' ? 'text-orange-400' : 'text-slate-600'}">${pTarde}</span>
                                    </div>
                                    <div class="flex flex-col text-right w-24">
                                        <span class="text-[10px] text-slate-500 font-bold uppercase">OV</span>
                                        <span class="text-xs font-mono font-bold truncate ${ovTarde !== '---' ? 'text-slate-300' : 'text-slate-600'}">${ovTarde}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        });
    </script>
</body>
</html>
