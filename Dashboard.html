<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão à Vista - Linha CT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .live-indicator { animation: pulse-red 2s infinite; }
        
        /* Animação suave de entrada para os cards */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        
        /* Esconde scrollbar mas mantém funcionalidade */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col p-4 md:p-6 overflow-x-hidden">

    <header class="flex flex-col md:flex-row justify-between items-center mb-6 bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 via-purple-600 to-red-600"></div>
        
        <div class="flex items-center gap-6 mb-4 md:mb-0">
            <svg viewBox="0 0 350 100" class="h-14 object-contain drop-shadow-lg" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="346" height="56" fill="none" stroke="#ffffff" stroke-width="3"/>
                <rect x="8" y="8" width="334" height="44" fill="#ffffff"/>
                <text x="175" y="41" fill="#231f20" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" text-anchor="middle" letter-spacing="3">RANDON</text>
                <text x="5" y="94" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900" letter-spacing="1">TRIEL-HT</text>
                <polygon points="195,94 240,94 270,64 195,64" fill="#e30613"/>
                <polygon points="250,94 270,94 300,64 280,64" fill="#ffffff"/>
                <polygon points="280,94 345,94 345,64 310,64" fill="#a7a9ac"/>
            </svg>
            <div class="border-l-2 border-slate-600 pl-6">
                <h1 class="text-3xl font-black tracking-wide text-white drop-shadow-md">GESTÃO À VISTA</h1>
                <p class="text-blue-400 font-bold uppercase tracking-widest text-sm flex items-center gap-2">
                    <i class="fa-solid fa-truck-fast"></i> Linha Carrega Tudo (CT)
                </p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="text-right bg-slate-900/50 p-3 rounded-xl border border-slate-700">
                <p id="data-atual" class="text-xl font-bold text-white"></p>
                <p id="hora-atual" class="text-2xl text-blue-400 font-mono font-black drop-shadow-[0_0_8px_rgba(96,165,250,0.5)]"></p>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="flex items-center gap-2 bg-red-950/40 px-5 py-2.5 rounded-full border border-red-500/50 shadow-[0_0_15px_rgba(239,68,68,0.2)]">
                    <div class="w-3.5 h-3.5 bg-red-500 rounded-full live-indicator"></div>
                    <span class="text-red-500 font-bold tracking-widest text-sm">AO VIVO</span>
                </div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl hover:-translate-y-1 hover:shadow-2xl transition-all duration-300 group">
            <div class="flex justify-between items-start mb-2">
                <p class="text-slate-400 font-semibold uppercase text-xs tracking-wider">Efetivo (Ponto Soft)</p>
                <i class="fa-solid fa-users text-slate-600 group-hover:text-blue-400 transition-colors text-xl"></i>
            </div>
            <div class="flex items-baseline gap-2 mt-2">
                <span id="kpi-pontosoft" class="text-5xl font-black text-blue-400 drop-shadow-md">0</span>
                <span id="kpi-necessario" class="text-xl text-slate-500 font-bold">/ 0</span>
            </div>
        </div>
        
        <div id="card-absenteismo" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl hover:-translate-y-1 hover:shadow-2xl transition-all duration-300 group">
            <div class="flex justify-between items-start mb-2">
                <p class="font-semibold uppercase text-xs tracking-wider opacity-80">Absenteísmo</p>
                <i class="fa-solid fa-user-minus opacity-50 text-xl"></i>
            </div>
            <span id="kpi-absenteismo" class="text-5xl font-black mt-2 block drop-shadow-md">0</span>
        </div>

        <div id="card-manha" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl flex justify-between items-center hover:-translate-y-1 hover:shadow-2xl transition-all duration-300">
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <i class="fa-solid fa-sun text-yellow-500 opacity-80"></i>
                    <p class="font-semibold uppercase text-xs tracking-wider opacity-80">Ronda Manhã (Desvios)</p>
                </div>
                <span id="kpi-manha-diff" class="text-5xl font-black drop-shadow-md">0</span>
            </div>
            <div class="text-right bg-black/20 p-3 rounded-lg backdrop-blur-sm">
                <p class="text-[10px] opacity-70 uppercase font-black tracking-widest">Na Linha</p>
                <p id="kpi-manha-total" class="text-3xl font-black mt-1">0</p>
            </div>
        </div>

        <div id="card-tarde" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl flex justify-between items-center hover:-translate-y-1 hover:shadow-2xl transition-all duration-300">
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <p class="text-orange-400 font-black uppercase text-xs tracking-wider">Ronda Tarde (Desvios)</p>
                </div>
                <span id="kpi-tarde-diff" class="text-5xl font-black drop-shadow-md">0</span>
            </div>
            <div class="text-right bg-black/20 p-3 rounded-lg backdrop-blur-sm">
                <p class="text-[10px] opacity-70 uppercase font-black tracking-widest">Na Linha</p>
                <p id="kpi-tarde-total" class="text-3xl font-black mt-1">0</p>
            </div>
        </div>
    </div>

    <div class="flex-grow bg-slate-800 rounded-2xl border border-slate-700 shadow-2xl p-6 flex flex-col relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-slate-600"></div>
        <div class="flex items-center gap-3 mb-6 border-b border-slate-700 pb-4">
            <i class="fa-solid fa-network-wired text-blue-400 text-xl"></i>
            <h2 class="text-xl font-black text-white tracking-wide">STATUS POR POSTO DE TRABALHO</h2>
        </div>
        
        <div id="grid-postos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-5 flex-grow content-start">
            </div>
    </div>

    <footer class="mt-6 text-center">
        <p class="text-xs font-bold text-slate-500 tracking-widest uppercase flex justify-center items-center gap-2">
            <i class="fa-solid fa-code"></i> Desenvolvido por Alexsandro B. Tozzo - Analista de Production
        </p>
    </footer>

    <script>
        // Relógio
        setInterval(() => {
            const agora = new Date();
            document.getElementById('data-atual').innerText = agora.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
            document.getElementById('hora-atual').innerText = agora.toLocaleTimeString('pt-BR', { hour12: false });
        }, 1000);

        // Configuração Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyADizntIBb7U7SRJbENZq6ybZ1NuS2ri8w",
            authDomain: "gestaoalocamentolinhact.firebaseapp.com",
            databaseURL: "https://gestaoalocamentolinhact-default-rtdb.firebaseio.com",
            projectId: "gestaoalocamentolinhact",
            storageBucket: "gestaoalocamentolinhact.firebasestorage.app",
            messagingSenderId: "72994788023",
            appId: "1:72994788023:web:954b5a023130b5f77ab332"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Listener de Dados
        database.ref('linhaCT/dados').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const pts = parseInt(data.efetivo.pontoSoft) || 0;
            const nec = parseInt(data.efetivo.necessario) || 0;
            const abs = Math.max(0, nec - pts);

            // Atualiza KPI Ponto Soft
            document.getElementById('kpi-pontosoft').innerText = pts;
            document.getElementById('kpi-necessario').innerText = `/ ${nec}`;
            document.getElementById('kpi-absenteismo').innerText = abs;
            
            // Lógica de Cores - Absenteísmo
            const cardAbs = document.getElementById('card-absenteismo');
            if(abs > 0) { 
                cardAbs.className = "bg-red-900/30 p-6 rounded-2xl border border-red-500/50 text-red-400 shadow-[0_0_15px_rgba(239,68,68,0.15)] hover:-translate-y-1 transition-all duration-300"; 
            } else { 
                cardAbs.className = "bg-emerald-900/20 p-6 rounded-2xl border border-emerald-500/30 text-emerald-400 shadow-[0_0_15px_rgba(16,185,129,0.1)] hover:-translate-y-1 transition-all duration-300"; 
            }

            // Somatório Rondas
            let tm = 0, tt = 0;
            if (data.postos) {
                data.postos.forEach(p => { 
                    if (p && p.manha) tm += parseInt(p.manha.pessoas) || 0; 
                    if (p && p.tarde) tt += parseInt(p.tarde.pessoas) || 0; 
                });
            }

            // Função para pintar Rondas
            const pintaCardRonda = (idTotal, idDiff, idCard, total) => {
                const diff = pts - total;
                document.getElementById(idTotal).innerText = total;
                const elDiff = document.getElementById(idDiff);
                const elCard = document.getElementById(idCard);
                const baseClasses = "p-6 rounded-2xl border shadow-xl flex justify-between items-center hover:-translate-y-1 transition-all duration-300";
                
                if (total === 0) { 
                    elDiff.innerText = "-"; 
                    elDiff.className = "text-5xl font-black text-slate-500 drop-shadow-md"; 
                    elCard.className = `bg-slate-800 border-slate-700 text-slate-300 ${baseClasses}`; 
                } else if (diff === 0) { 
                    elDiff.innerText = "OK"; 
                    elDiff.className = "text-5xl font-black text-emerald-400 drop-shadow-[0_0_8px_rgba(16,185,129,0.5)]"; 
                    elCard.className = `bg-emerald-950/20 border-emerald-500/40 text-emerald-300 shadow-[0_0_15px_rgba(16,185,129,0.1)] ${baseClasses}`; 
                } else if (diff > 0) { 
                    elDiff.innerText = diff; 
                    elDiff.className = "text-5xl font-black text-red-500 drop-shadow-[0_0_8px_rgba(239,68,68,0.5)]"; 
                    elCard.className = `bg-red-950/30 border-red-500/50 text-red-200 shadow-[0_0_15px_rgba(239,68,68,0.15)] ${baseClasses}`; 
                } else { 
                    elDiff.innerText = `+${Math.abs(diff)}`; 
                    elDiff.className = "text-5xl font-black text-amber-400 drop-shadow-[0_0_8px_rgba(251,191,36,0.5)]"; 
                    elCard.className = `bg-amber-950/20 border-amber-500/40 text-amber-200 shadow-[0_0_15px_rgba(251,191,36,0.1)] ${baseClasses}`; 
                }
            };

            pintaCardRonda('kpi-manha-total', 'kpi-manha-diff', 'card-manha', tm);
            pintaCardRonda('kpi-tarde-total', 'kpi-tarde-diff', 'card-tarde', tt);

            // Renderiza Postos
            if (data.postos) {
                document.getElementById('grid-postos').innerHTML = data.postos.map((p, index) => {
                    if (!p) return '';
                    const pManha = (p.manha && p.manha.pessoas) ? p.manha.pessoas : '-';
                    const ovManha = (p.manha && p.manha.ov) ? p.manha.ov : '---';
                    const pTarde = (p.tarde && p.tarde.pessoas) ? p.tarde.pessoas : '-';
                    const ovTarde = (p.tarde && p.tarde.ov) ? p.tarde.ov : '---';

                    // Animação cascata (delay diferente para cada card)
                    const animationDelay = `style="animation-delay: ${index * 50}ms"`;

                    return `
                        <div class="bg-slate-900 rounded-xl border border-slate-700 shadow-lg hover:border-blue-500/50 hover:shadow-[0_0_15px_rgba(59,130,246,0.2)] transition-all duration-300 flex flex-col justify-between overflow-hidden group animate-fade-in opacity-0" ${animationDelay}>
                            <div class="bg-slate-800/80 p-3 border-b border-slate-700 relative">
                                <div class="absolute left-0 top-0 h-full w-1 bg-blue-500 group-hover:bg-blue-400 transition-colors"></div>
                                <h3 class="text-center font-bold text-slate-200 truncate pl-2 text-lg" title="${p.nome || 'Posto'}">${p.nome || 'Posto'}</h3>
                            </div>
                            
                            <div class="p-3 space-y-3">
                                <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-lg border border-slate-700/50 group-hover:bg-slate-800 transition-colors">
                                    <div class="flex flex-col items-center w-1/3">
                                        <span class="text-[10px] text-slate-400 font-black uppercase tracking-wider mb-1 flex items-center gap-1"><i class="fa-solid fa-sun text-yellow-500/70"></i> Manhã</span>
                                        <div class="bg-slate-900 px-3 py-1 rounded border border-slate-700 w-full text-center">
                                            <span class="text-2xl font-black ${pManha !== '-' ? 'text-blue-400' : 'text-slate-600'}">${pManha}</span>
                                        </div>
                                    </div>
                                    <div class="flex flex-col text-right w-3/5">
                                        <span class="text-[10px] text-slate-400 font-black uppercase tracking-wider mb-1">Ord. Venda</span>
                                        <div class="bg-slate-950 px-3 py-2 rounded border border-slate-600 shadow-inner overflow-hidden">
                                            <span class="text-lg font-mono font-black truncate block ${ovManha !== '---' ? 'text-white' : 'text-slate-600'} cursor-default" title="${ovManha}">${ovManha}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-lg border border-slate-700/50 group-hover:bg-slate-800 transition-colors">
                                    <div class="flex flex-col items-center w-1/3">
                                        <span class="text-[11px] text-orange-400 font-black uppercase tracking-wider mb-1">Tarde</span>
                                        <div class="bg-slate-900 px-3 py-1 rounded border border-slate-700 w-full text-center">
                                            <span class="text-2xl font-black ${pTarde !== '-' ? 'text-orange-400' : 'text-slate-600'}">${pTarde}</span>
                                        </div>
                                    </div>
                                    <div class="flex flex-col text-right w-3/5">
                                        <span class="text-[10px] text-slate-400 font-black uppercase tracking-wider mb-1">Ord. Venda</span>
                                        <div class="bg-slate-950 px-3 py-2 rounded border border-slate-600 shadow-inner overflow-hidden">
                                            <span class="text-lg font-mono font-black truncate block ${ovTarde !== '---' ? 'text-white' : 'text-slate-600'} cursor-default" title="${ovTarde}">${ovTarde}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        });
    </script>
</body>
</html>

```
